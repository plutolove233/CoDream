log:
  #  日志输出类型 File,CMD,ES
  type: File
  filepath: logs
  filename: system.log
system:
  #  系统服务名
  Name: api.codream.com
  #  环境
  Mode: debug
  #  秘钥
  AccessSecret: c0dreamAccess
  RefreshSecret: c0dreamRefresh
  #  rsa私钥
  RSAPrivate: configs/rsa/private.pem
  #  rsa公钥
  RSAPublic: configs/rsa/public.pem
  #  过期时间（秒）
  AccessTokenExpireTime: 3600
  RefreshTokenExpireTime: 604800
  RedisExpireTime: 3600
  SessionExpireTime: 86400
  #  服务中心ID
  WorkerID: 00001
  #  数据中心ID
  DataCenterID: 00001
  #  fs本地文件系统路径
  FsPath: save
  #  部署服务器ip
  SysIP: 0.0.0.0
  #  部署服务器端口
  SysPort: 8080
   # 使用Postgresql
  UsePostgresql: true
  #  使用redis
  UseRedis: true
# remote:
#   #  ES路由
#   ESUrl: http://192.168.41.100:9200
# ── PostgreSQL ──
postgresql:
  PostgreSQLUser: codream
  PostgreSQLPassword: codream_secret        # 生产环境请替换为强密码
  PostgreSQLDBName: codream
  PostgreSQLHost: localhost
  PostgreSQLPort: 5432

# ── Redis ──
redis:
  RedisHost: localhost
  RedisPassword: codream_redis_secret     # 生产环境请替换为强密码
  RedisPort: 6379
