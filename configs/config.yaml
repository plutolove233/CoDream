log:
  #  日志输出类型 File,CMD,ES
  type: File
  filepath: logs
  filename: system.log
system:
  #  系统服务名
  Name: api.codream.com
  #  环境
  Mode: debug
  #  秘钥
  Secret: f977ce82bf2c67551cd75625db7c238a4bf59b9ec663297ebd08ad23f15bcb52
